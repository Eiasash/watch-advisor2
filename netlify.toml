[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  VITE_SUPABASE_URL = "https://oaojkanozbfpofbewtfq.supabase.co"
  VITE_SUPABASE_ANON_KEY = "sb_publishable_HvifswT9kzu3qUI3XbkNWg_aKtfYdUw"

[functions."push-brief"]
  schedule = "30 6 * * *"

[functions."auto-heal"]
  schedule = "0 5 * * *"

[functions."supabase-keepalive"]
  schedule = "0 6 */5 * *"

[functions."monthly-report"]
  schedule = "0 7 1 * *"

# Bulk/AI functions need extra time for Claude retries (up to 2s+8s backoff)
[functions."bulk-tag"]
  timeout = 26

[functions."classify-image"]
  timeout = 26

[functions."ai-audit"]
  timeout = 26

[functions."occasion-planner"]
  timeout = 26

[functions."selfie-check"]
  timeout = 26

[functions."claude-stylist"]
  timeout = 26

[functions."style-dna"]
  timeout = 26

# ── Lighthouse audit on every deploy ──────────────────────────────────────────
[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs]
    # Fail deploy if performance drops below thresholds
    output_path = "reports/lighthouse"

  [plugins.inputs.thresholds]
    performance = 0.6
    accessibility = 0.8
    best-practices = 0.5
    seo = 0.7

