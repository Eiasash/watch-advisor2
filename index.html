<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f131a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WatchAdv" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="shortcut icon" href="/favicon-32.png" />

    <!-- SEO / share -->
    <meta name="description" content="Smart watch rotation, outfit coordination, and wardrobe management." />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Watch Advisor</title>

    <style>
      :root { color-scheme: dark light; font-family: Inter, system-ui, sans-serif; }
      body { margin: 0; background: #101114; color: #f4f5f7; }
      * { box-sizing: border-box; }

      /* Safe area insets (notch / home bar) */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      /* Responsive breakpoints */
      @media (max-width: 768px) {
        .wa-main-grid { grid-template-columns: 1fr !important; }
        .wa-outfit-grid { grid-template-columns: repeat(2, 1fr) !important; }
      }
      @media (max-width: 520px) {
        .wa-container { padding: 10px 12px !important; }
        .wa-outfit-grid { grid-template-columns: 1fr 1fr !important; }
      }
      @media (max-width: 380px) {
        .wa-container { padding: 8px 8px !important; }
      }

      /* Accessible focus ring */
      button:focus-visible, select:focus-visible, input:focus-visible {
        outline: 2px solid #3b82f6;
        outline-offset: 2px;
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Min tap targets for mobile */
      @media (max-width: 768px) {
        button, select, [role="button"] { min-height: 44px; min-width: 44px; }
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2b3140; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

      /* Prevent text selection on UI elements */
      button, [role="button"] { -webkit-user-select: none; user-select: none; }

      /* Prevent pull-to-refresh (handled by app) */
      html { overscroll-behavior-y: contain; }

      /* PWA splash / loading — matches app bg */
      #root:empty::after {
        content: "";
        display: block;
        width: 100vw;
        height: 100vh;
        background: #101114;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
